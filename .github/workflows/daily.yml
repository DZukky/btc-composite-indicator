name: BTC Composite Daily

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC = 08:00 CET / 07:00 CEST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM:    ${{ secrets.RESEND_FROM }}
        run: python -m src.main

      - name: Commit cache + dashboard
        run: |
          git config user.name  "btc-bot"
          git config user.email "btc-bot@users.noreply.github.com"
          git add data/ dashboard/
          git diff --cached --quiet || git commit -m "daily $(date -u +%Y-%m-%d)"
          git push

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

  deploy:
    needs: run
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
