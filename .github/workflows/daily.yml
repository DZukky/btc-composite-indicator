name: BTC Composite Daily

on:
  # Trigger affidabile via cron-job.org (workflow_dispatch alle 06:00 UTC).
  # Il cron nativo di GitHub è stato rimosso: veniva ritardato di ore.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS:  ${{ secrets.TELEGRAM_CHAT_IDS }}
          DASHBOARD_URL:      ${{ secrets.DASHBOARD_URL }}
        run: python -m src.main

      - name: Commit cache + dashboard
        run: |
          git config user.name  "btc-bot"
          git config user.email "btc-bot@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || (git commit -m "daily $(date -u +%Y-%m-%d)" && git push)

      - name: Deploy a Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy docs --project-name=btc-composite-dzukky --branch=main --commit-dirty=true
